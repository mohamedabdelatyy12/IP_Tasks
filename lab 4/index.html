<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro To Do List</title>
<link rel="stylesheet" href="style.css">

<!-- icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<div class="app">

<h1>My Pro To-Do List</h1>

<div class="input-section">
<input id="taskInput" placeholder="Add a new task...">
<button id="addBtn"><i class="fa fa-plus"></i></button>
</div>

<div class="controls">

<div class="filters">
<button data-filter="all">All</button>
<button data-filter="completed">Completed</button>
<button data-filter="incomplete">Incomplete</button>
</div>

<div class="sort">
<button id="sortAlpha">Sort A-Z</button>
<button id="sortTime">Sort by Time</button>
</div>

</div>

<ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
